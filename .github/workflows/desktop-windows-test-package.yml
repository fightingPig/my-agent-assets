name: Desktop Windows Test Package

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
    paths:
      - apps/desktop/**
      - crates/**
      - Cargo.lock
      - Cargo.toml
      - .github/workflows/desktop-windows-test-package.yml

permissions:
  contents: read

jobs:
  build-windows-test-package:
    name: Windows MSI and NSIS test package
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/desktop
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate frontend contracts
        run: |
          npm run typecheck
          npm test -- --run

      - name: Run Windows shared-core regression tests
        working-directory: ${{ github.workspace }}
        run: |
          cargo test -p my-agent-assets-core
          cargo test -p my-agent-assets-desktop

      - name: Build unsigned Windows test installers
        run: npm run tauri -- build --bundles msi,nsis

      - name: Upload unsigned Windows test installers
        uses: actions/upload-artifact@v4
        with:
          name: my-agent-assets-windows-unsigned-test-package
          if-no-files-found: error
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
          retention-days: 14
