name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Validate tag and project versions
        run: node scripts/check-release-version.mjs "${GITHUB_REF_NAME}"

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Typecheck frontend
        working-directory: apps/desktop
        run: npm run typecheck

      - name: Test frontend
        working-directory: apps/desktop
        run: npm test

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Test core and CLI
        run: cargo test --locked -p my-agent-assets-core -p my-agent-assets-cli

  desktop:
    name: Desktop (${{ matrix.label }})
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            platform: macos-latest
            rust_targets: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin --bundles dmg"
          - label: macOS Intel
            platform: macos-latest
            rust_targets: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin --bundles dmg"
          - label: Windows x64
            platform: windows-latest
            rust_targets: x86_64-pc-windows-msvc
            args: "--target x86_64-pc-windows-msvc --bundles nsis"
          - label: Linux x64
            platform: ubuntu-22.04
            rust_targets: x86_64-unknown-linux-gnu
            args: "--target x86_64-unknown-linux-gnu --bundles appimage,deb"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: ${{ matrix.rust_targets }}

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tauriScript: npm run tauri
          tagName: ${{ github.ref_name }}
          releaseName: "My Agent Assets ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          generateReleaseNotes: true
          uploadUpdaterJson: false
          retryAttempts: 2
          releaseAssetNamePattern: "My-Agent-Assets_[version]_[platform]_[arch][setup][ext]"
          args: ${{ matrix.args }}

  cli:
    name: CLI (${{ matrix.label }})
    needs:
      - validate
      - desktop
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            platform: macos-latest
            target: aarch64-apple-darwin
            asset_suffix: macos_aarch64
          - label: macOS Intel
            platform: macos-latest
            target: x86_64-apple-darwin
            asset_suffix: macos_x86_64
          - label: Windows x64
            platform: windows-latest
            target: x86_64-pc-windows-msvc
            asset_suffix: windows_x86_64
          - label: Linux x64
            platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            asset_suffix: linux_x86_64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: cli-${{ matrix.target }}

      - name: Build CLI
        run: cargo build --locked --release -p my-agent-assets-cli --bin maa --target ${{ matrix.target }}

      - name: Package CLI (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ASSET="maa_${VERSION}_${{ matrix.asset_suffix }}.tar.gz"
          mkdir -p dist/package
          cp "target/${{ matrix.target }}/release/maa" dist/package/maa
          chmod +x dist/package/maa
          tar -C dist/package -czf "dist/${ASSET}" maa
          if command -v sha256sum >/dev/null 2>&1; then
            (cd dist && sha256sum "${ASSET}" > "${ASSET}.sha256")
          else
            (cd dist && shasum -a 256 "${ASSET}" > "${ASSET}.sha256")
          fi

      - name: Package CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart('v')
          $asset = "maa_${version}_${{ matrix.asset_suffix }}.zip"
          New-Item -ItemType Directory -Force -Path dist/package | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/maa.exe" "dist/package/maa.exe"
          Compress-Archive -Path "dist/package/maa.exe" -DestinationPath "dist/$asset" -Force
          $hash = (Get-FileHash "dist/$asset" -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $asset" | Set-Content "dist/$asset.sha256"

      - name: Upload CLI assets (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" dist/* --clobber

      - name: Upload CLI assets (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $files = Get-ChildItem -Path dist -File | ForEach-Object { $_.FullName }
          gh release upload $env:GITHUB_REF_NAME $files --clobber
